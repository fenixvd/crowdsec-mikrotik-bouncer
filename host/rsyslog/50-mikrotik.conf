# /etc/rsyslog.d/50-mikrotik.conf
# Приём UDP-syslog от роутера и запись потока в отдельный файл.
# Подставьте ROUTER_IP. Затем: sudo systemctl restart rsyslog
module(load="imudp")
input(type="imudp" port="514")

if $fromhost-ip == 'ROUTER_IP' then {
    action(type="omfile" file="/var/log/mikrotik.log")
    stop
}
