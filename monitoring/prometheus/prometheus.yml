global:
  scrape_interval: 30s
  scrape_timeout: 15s

scrape_configs:
  - job_name: crowdsec
    static_configs:
      - targets: ['crowdsec:6060']      # по имени контейнера в общей docker-сети

  - job_name: node                       # метрики хоста (node-exporter, network_mode: host)
    static_configs:
      - targets: ['SERVER_IP:9100']

  - job_name: cadvisor                   # метрики по контейнерам
    static_configs:
      - targets: ['cadvisor:8080']
